name: Gemini Model Check

on:
  schedule:
    # 毎日 UTC 0:00 = JST 9:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Gemini models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MONITOR_BOT_TOKEN: ${{ secrets.GEMINI_MONITOR_BOT_TOKEN }}
          GEMINI_MONITOR_CHAT_ID: ${{ secrets.GEMINI_MONITOR_CHAT_ID }}
        run: python check_models.py
